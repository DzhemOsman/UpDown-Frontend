server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # SPA-Routing (Vue Router)
    }

    location /v1/ {
        proxy_pass http://api:8000/v1/;       # interner Docker-Hostname
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}